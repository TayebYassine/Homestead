site_name: Homestead
site_author: Tayeb Yassine
site_description: An advanced, chunk-based land claiming plugin for Minecraft servers, with multiple APIs support, based on Bukkit API.
copyright: Copyright (&copy;) 2025 Tayeb Yassine

extra:
  social:
    - icon: fontawesome/solid/code
      link: /Homestead/javadoc/
      name: JavaDoc

theme:
  name: material
  favicon: assets/favicon.ico
  logo: assets/logo.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

repo_url: https://github.com/TayebYassine/Homestead
repo_name: TayebYassine/Homestead

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - def_list
  - footnotes

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md

  - Getting Started:
    - Prerequisites: Getting Started/Prerequisites.md
    - Installation: Getting Started/Installation.md
    - First Steps: Getting Started/First Steps.md
    - FAQ: Getting Started/FAQ.md

  - Configuration:
    - Overview: Configuration/Overview.md
    - Database: Configuration/Database.md
    - Database Migration: Configuration/Database Migration.md
    - Ranks & Limits: Configuration/Ranks and Limits.md
    - Flags Overview: Configuration/Flags Overview.md
    - Player Flags: Configuration/Player Flags.md
    - World Flags: Configuration/World Flags.md
    - Control Flags: Configuration/Control Flags.md
    - Disabled Flags: Configuration/Disabled Flags.md
    - Leveling & XP: Configuration/Leveling and XP.md
    - Rewards: Configuration/Rewards.md
    - Other Settings: Configuration/Other Settings.md

  - Economy:
    - Setup: Economy/Setup.md
    - Regional Bank: Economy/Bank.md
    - Upkeep: Economy/Upkeep.md
    - Member Taxes: Economy/Taxes.md
    - Rent: Economy/Rent.md
    - Sell: Economy/Sell.md

  - Usage:
    - Creating a Region: Usage/Creating a Region.md
    - Managing a Region: Usage/Managing a Region.md
    - Sub-Areas: Usage/Sub-Areas.md
    - Wars: Usage/Wars.md
    - Welcome Signs: Usage/Welcome Signs.md
    - Region Chat & Mail: Usage/Region Chat and Mail.md
    - Region Storage: Usage/Region Storage.md
    - Leveling & XP: Usage/Leveling and XP.md
    - Borders & Maps: Usage/Borders and Maps.md
    - Teleportation: Usage/Teleportation.md
    - Merging Regions: Usage/Merging Regions.md

  - Commands:
    - Player Commands: Commands/Player Commands.md
    - Admin Commands: Commands/Admin Commands.md
    - Permissions: Commands/Permissions.md

  - Advanced:
    - Language: Advanced/Language.md
    - Menus: Advanced/Menus.md
    - PlaceholderAPI: Advanced/PlaceholderAPI.md
    - Plugin Integrations: Advanced/Integrations.md
    - Developer API: Advanced/API.md
    - API Examples: Advanced/API Examples.md
    - Bedrock Edition: Advanced/Bedrock Edition.md
    - Experimental: Advanced/Experimental.md

  - Support:
    - Changelog: Support/Changelog.md
    - Troubleshooting: Support/Troubleshooting.md
    - Getting Help: Support/Support.md
