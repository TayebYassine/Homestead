  teleport_error_player_moved: "&cYou've moved, the teleportation has been canceled."
  teleport_success: "&7You have been teleported to this following location: {0}"

  upkeep_error_cannot_pay:
    - "&cUnable to pay {amount} to maintain the region &2{region}&c."
    - "&cTotal chunks removed: &7{chunks} chunks"
  upkeep_success:
    - "&7Successfully paid &c{amount} &7to upkeep the region &2{region}&7."
