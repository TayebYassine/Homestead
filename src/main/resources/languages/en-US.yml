    2: "{__prefix__} &eYou have already sent 10 unread mails. Please wait until the region owner reads them."
    3: "{__prefix__} &cMiniMessage tags are strictly forbidden."
    4: "{__prefix__} &aMail has been sent!"
  members:
    0: "{__prefix__} &cYou do not have a selected region. Use: &e/hs set [region]"
  mergeaccept:
    0: "{__prefix__} &cYou do not have a selected region. Use: &e/hs set [region]"
    1: "{__prefix__} &cNobody has requested to merge their region with yours."
    2: "{__prefix__} &cOnly the region owner can perform this action."
