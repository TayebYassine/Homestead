    6: "{__prefix__} &cYou cannot deposit nothing."
    7: "{__prefix__} &cYou do not have that amount to deposit."
    8: "{__prefix__} &cThe bank is full! You cannot deposit more money into this region."
    9: "{__prefix__} &a{0} has been transferred from your wallet to &3{1}&7's bank account."
  flags:
    0: "{__prefix__} &ePlease provide a flag type."
    1: "{__prefix__} &cYou do not have a selected region. Use: &e/hs set [region]"
    2: "{__prefix__} &cYou do not have permission to do this."
    3: "{__prefix__} &cYou do not have permission from the owner to manage flags."
    4: "{__prefix__} &7Insufficient arguments. Usage: &e{0}"
    5: "{__prefix__} &ePlease provide a player name."
    6: "{__prefix__} &7That player is not a member of the region."
    7: "{__prefix__} &cYou cannot perform this action on yourself."
    8: "{__prefix__} &7Invalid flag provided."
    9: "{__prefix__} &7That flag is currently disabled."
    10: "{__prefix__} &7{0} -> {1} (Member: {2} - {3})"
    11: "{__prefix__} &7{0} -> {1} (Global - {2})"
    12: "{__prefix__} &7{0} -> {1} (World - {2})"
  fly:
    0: "{__prefix__} &cYou may only fly in a region where you are trusted or the owner."
    1: "{__prefix__} &aFlight mode has been enabled."
    2: "{__prefix__} &aFlight mode has been disabled."
  help:
    0: "{__prefix__} &7Help command is currently unavailable."
  home:
    0: "{__prefix__} &cYou do not have a selected region. Use: &e/hs set [region]"
    1: "{__prefix__} &7The region '&2{0}&7' does not have a spawn location set!"
    2: "{__prefix__} &cYou do not have permission to teleport to the region's spawn."
  kick:
    0: "{__prefix__} &ePlease provide the player name to kick."
    1: "{__prefix__} &cYou do not have a selected region. Use: &e/hs set [region]"
    2: "{__prefix__} &cYou do not have permission from the owner to kick players."
    3: "{__prefix__} &cInvalid player name provided, or they are not currently online."
    4: "{__prefix__} &cThe player is already banned and cannot enter the region."
    5: "{__prefix__} &cYou cannot perform this action on yourself."
    6: "{__prefix__} &cYou cannot kick the renter."
    7: "{__prefix__} &cThe player is not inside the region borders."
    8: "{__prefix__} &a{0} has been kicked from the region."
  leave:
    0: "{__prefix__} &eYou must confirm that you want to leave this region."
    1: "{__prefix__} &cYou do not have a selected region. Use: &e/hs set [region]"
    2: "{__prefix__} &cYou are not a member of the region."
    3: "{__prefix__} &cYou cannot perform this action on yourself."
    4: "{__prefix__} &cYou have left the region '&2{0}&7'."
  levels:
    0: "{__prefix__} &cThis feature is currently disabled."
    1: "{__prefix__} &cYou do not have a selected region. Use: &e/hs set [region]"
  logs:
    0: "{__prefix__} &cYou do not have a selected region. Use: &e/hs set [region]"
