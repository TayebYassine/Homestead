    1: "{__prefix__} &cNo region found with the name '&2{0}&7'."
    2: "{__prefix__} &cYou have not been invited by that region."
    3: "{__prefix__} &aYou have successfully rejected the invitation. If the owner keeps spamming invitations, disable invitations in your settings."
