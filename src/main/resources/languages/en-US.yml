    0: "{__prefix__} &7Unable to find a player with the name '&3{0}&7'."
  rate:
    0: "{__prefix__} &ePlease provide the region name."
    1: "{__prefix__} &cNo region found with the name '&2{0}&7'."
  info:
    0: "{__prefix__} &cNo region found with the name '&2{0}&7'."
