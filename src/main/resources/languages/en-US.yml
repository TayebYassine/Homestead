command-descriptions:
  hs_accept: "Accept an invitation sent by a region."
  hs_auto: "Toggle auto-claim session. When enabled, move in the wilderness to claim chunks."
  hs_balance: "Check a region's bank amount."
  hs_banlist: "View and manage bans on a region."
  hs_ban: "Ban a player from entering a region."
  hs_borders: "View a region's borders by spawning particles within chunk edges."
  hs_chat: "Talk privately with a region's members."
  claim: "Claim a chunk."
  hs_claimlist: "View and manage claimed chunks of a region."
  hs_create: "Create a new region."
  hs_delete: "Delete an existing region."
  hs_deny: "Deny an invitation that was sent by a region."
  hs_deposit: "Transfer an amount of money from your wallet to a region's bank account."
  hs_flags: "Update a flag's state."
  hs_fly: "Toggle flight mode session. When enabled, you can only fly within a region's borders."
  hs_help: "View list of commands."
  hs_home: "Teleport to a selected region's spawn, faster than /hs visit."
  homestead: "The main command for Homestead."
  hs_kick: "Kick a player from a region, only if they're inside the region borders."
  hs_leave: "Leave a region which you are trusted in."
  hs_levels: "View the level and XP of a region."
  hs_logs: "View and manage logs & mails of a region."
  hs_mail: "Send a mail to a region, even when the region owner is offline."
  hs_members: "View and manage members of a region."
  hs_menu: "Open the main menu of Homestead."
  hs_mergeaccept: "Accept a merge request."
  hs_merge: "Send a merge request."
  hs_player: "View a player's information."
  hs_rate: "Give a rating to a region."
  hs_info: "View a region's information."
  hs_rename: "Update a region's name."
  hs_rewards: "View a region's rewards."
  hs_setdescription: "Update a region's description."
  hs_setdisplayname: "Update a region's display name."
  hs_setmapcolor: "Update a region's map color, for web-rendering plugins."
  hs_setmapicon: "Update a region's map icon, for web-rendering plugins."
  hs_setmembertax: "Set the amount for each trusted player must pay to stay in the region."
  hs_set: "Set a region as targeted/selected. Any changes to a selected region will directly apply to it."
  hs_setspawn: "Update a region's spawn location."
  hs_settime: "Update a region's time. This is client-side feature."
  hs_setweather: "Update a region's weather. This is client-side feature."
  hs_storage: "View a region's storage, only accessed by the owner and trusted players."
  hs_subareas: "Manage sub-areas of a region."
  hs_top: "Compare your selected region to other regions."
  hs_trust: "Invite a player to a region."
  hs_unban: "Unban a player from a region."
  unclaim: "Unclaim a chunk."
  hs_untrust: "Untrust or revoke invitation of a player for a region."
  hs_visit: "Visit a region."
  hs_war: "Manage wars."
  hs_withdraw: "Transfer an amount of money from a region's bank to your own wallet."

