# WARNING:
# MiniMessage is NOT supported on Spigot.
# If you are using Spigot, please remove any XML-like tags, for example, "<click:…>", "<hover:…>", "<red>"… etc.

# NOTE:
# Legacy color formats and MiniMessage formats are supported for PaperMC and its forks (Folia, Purpur...).

default:
  region-description: "Owned by %owner%"
  war-description: "No description provided"
  reason: "No reason provided"
  none: "&cNone"
  never: "&cNever"
  isTrue: "&aTrue"
  isFalse: "&cFalse"
  isEnabled: "&aEnabled"
  isDisabled: "&cDisabled"
  flagSet: "&aAllow"
  flagUnset: "&cDeny"
  online: "&aOnline"
  offline: "&cOffline"
  banned: "&4Banned"
  log-author: Server
  star: "★"
  star-color:
    1: "&c"
    2: "&6"
    3: "&e"
    4: "&a"
    5: "&a"

prefix: "&8[&6Homestead&8]&r"

commands:
  accept:
    0: "{__prefix__} &ePlease provide the region name."
    1: "{__prefix__} &cNo region found with the name '&2{0}&7'."
    2: "{__prefix__} &cYou are already trusted in this region."
    3: "{__prefix__} &cYou are not invited to this region."
    4: "{__prefix__} &cYou are banned from this region."
    5: "{__prefix__} &cThis region has reached its maximum member limit."
    6: "{__prefix__} &aYou have accepted the invitation. You are now trusted in the region '&2{0}&7'."
  autoclaim:
    0:
      - "{__prefix__} &aAuto-claim has been enabled."
      - "{__prefix__} &7Any unclaimed chunk will be automatically claimed for the region '&2{0}&7'."
    1: "{__prefix__} &aAuto-claim has been disabled."
  balance:
    0: "{__prefix__} &cEconomy integration is currently disabled."
    1: "{__prefix__} &cNo region found with the name '&2{0}&7'."
    2: "{__prefix__} &cYou do not have a selected region. Use: &e/hs set [region]"
