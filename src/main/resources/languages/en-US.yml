  banlist:
    0: "{__prefix__} &cYou do not have a selected region. Use: &e/hs set [region]"
    1:
      - "{__prefix__} &7The region '&3{0}&7' has banned &2{1}&7 players."
      - "{__prefix__} &7Click &b<click:run_command:/hs banlist gui>here</click> &7to view them."
