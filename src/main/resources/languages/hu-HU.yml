  13: '{__prefix__} &cA régió jelenleg háborúban van.'
  14: '{__prefix__} &cSajnáljuk, de ezt nem teheted meg!'
  15: '{__prefix__} &cBérelted a régiót, nem vásárolhatod meg, amíg a szerződés le nem jár.'
