command-descriptions:
  hs_accept: Meghívás elfogadása egy régiótól.
  hs_auto: Automatikus foglalás munkamenet be-/kikapcsolása. Bekapcsolva a vadonban való mozgással foglalhatsz chunkokat.
  hs_balance: Régió bankszámla egyenlegének lekérdezése.
  hs_banlist: Kitiltások megtekintése és kezelése egy régióban.
  hs_ban: Játékos kitiltása egy régióból.
  hs_borders: Régió határainak megjelenítése részecskékkel a chunk szélein.
  hs_chat: Privát beszélgetés egy régió tagjaival.
  claim: Chunk lefoglalása.
  hs_claimlist: Régió lefoglalt chunkjainak megtekintése és kezelése.
  hs_create: Új régió létrehozása.
  hs_delete: Meglévő régió törlése.
  hs_deny: Régió által küldött meghívás elutasítása.
  hs_deposit: Pénz átutalása a pénztárcádból egy régió bankszámlájára.
  hs_flags: Flag állapotának frissítése.
  hs_fly: Repülési mód munkamenet be-/kikapcsolása. Bekapcsolva csak a régió határain belül repülhetsz.
  hs_help: Parancsok listájának megtekintése.
  hs_home: Teleportálás a kiválasztott régió spawnjára, gyorsabb mint a /hs visit.
  homestead: A Homestead fő parancsa.
  hs_kick: Játékos kirúgása egy régióból, csak ha a régió határain belül van.
  hs_leave: Régió elhagyása, amelyben megbízható vagy.
  hs_levels: Régió szintjének és XP-jének megtekintése.
  hs_logs: Régió naplóinak és leveleinek megtekintése és kezelése.
  hs_mail: Levél küldése egy régiónak, még akkor is, ha a régió tulajdonosa offline.
  hs_members: Régió tagjainak megtekintése és kezelése.
  hs_menu: A Homestead főmenüjének megnyitása.
  hs_mergeaccept: Egyesítési kérés elfogadása.
  hs_merge: Egyesítési kérés küldése.
  hs_player: Játékos adatainak megtekintése.
  hs_rate: Értékelés adása egy régiónak.
  hs_info: Régió adatainak megtekintése.
  hs_rename: Régió nevének frissítése.
  hs_rewards: Régió jutalmainak megtekintése.
  hs_setdescription: Régió leírásának frissítése.
  hs_setdisplayname: Régió megjelenítendő nevének frissítése.
  hs_setmapcolor: Régió térképszínének frissítése, webes renderelő pluginokhoz.
  hs_setmapicon: Régió térképikonjának frissítése, webes renderelő pluginokhoz.
  hs_setmembertax: Az összeg beállítása, amelyet minden megbízható játékosnak fizetnie kell a régióban maradáshoz.
  hs_set: Régió beállítása célként/kiválasztottként. Minden változás a kiválasztott régióra vonatkozik.
  hs_setspawn: Régió spawn helyszínének frissítése.
  hs_settime: Régió időjének frissítése. Ez egy kliensoldali funkció.
  hs_setweather: Régió időjárásának frissítése. Ez egy kliensoldali funkció.
  hs_storage: Régió tárolójának megtekintése, csak a tulajdonos és a megbízható játékosok férhetnek hozzá.
  hs_subareas: Régió alrégióinak kezelése.
  hs_top: A kiválasztott régió összehasonlítása más régiókkal.
  hs_trust: Játékos meghívása egy régióba.
  hs_unban: Játékos kitiltásának feloldása egy régióból.
  unclaim: Chunk felszabadítása.
  hs_untrust: Játékos megbízásának visszavonása vagy meghívásának törlése egy régióból.
  hs_visit: Régió meglátogatása.
  hs_war: Háborúk kezelése.
  hs_withdraw: Pénz átutalása egy régió bankjából a saját pénztárcádba.
