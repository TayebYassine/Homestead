"196": "{__prefix__} &cEgy régió vagy alterület bérlőt nem lehet kitiltani, hozzáadni, vagy kidobni! Leállíthatod a bérlést, ha te vagy a régió tulajdonosa."
"197": "{__prefix__} &cA szintek nem elérhetőek."
"198": "&7Megöltél egy &3{entity}&7-t, és elértél &6{xp} XP-t &7a régiónak &2{region}&7!"
"199": "{__prefix__} &3{playername} &7csatlakozott a régióhoz &2{region}."
"200": "{__prefix__} &3{player}&-nak/nek nincs elég pénze &c{price}, nem tudsz chunkot lefoglalni!"
"201": "{__prefix__} &cMegmozdultál, teleportálás megszakítva!"
"202": "{__prefix__} &7Kész."
"203": "{__prefix__} &cNincs elég pénzed {price}, hogy teleportálj!"
"204": "{__prefix__} &7Már nem vagy a régió tagja &2{region}&7!"
"205": "{__prefix__} &aRepülés bekapcsolva. &7Csak a régió területén belül tudsz repülni!"
"206": "{__prefix__} &7Repülés kikapcsolva."
"207": "{__prefix__} &cNem tudod bekapcsolni a repülést olyan régióban, ahol nem vagy tag, vagy régión kívül"
"208": "&aGratulálunk, elérted a &6{level}. &aszintet!"
"209": "{__prefix__} &cA megadott sugár túl nagy vagy túl kicsi."
"210": "{__prefix__} &cNincs jogod a régió időjárást állítanod."
"211": "{__prefix__} &cNincs jogod a régió idejét állítanod."
"212": "{__prefix__} &cNincs jogod teleportálni."
"213": "{__prefix__} &cTúl gyors vagy! Várj egy kicsit mielőtt újrapróbálnád."
"214": "&eA háború véget ért. &2{region}&e tagjai nyertek!"
"215": "{__prefix__} &7Alterület átméretezve!"

logs:
  "0": By {executor}, updated region name to {newname}.
  "1": By {executor}, updated location to {location}.
  "2": By {executor}, trusted a new member {playername}.
  "3": By {executor}, removed a member {playername}.
  "4": "{playername} has left the region."
  "5": "{playername} has been kicked, they're unable to pay taxes."
  "6": By {executor}, updated displayname to {newdisplayname}.

