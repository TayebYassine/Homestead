command-descriptions:
  hs_accept: Aceptar una invitación enviada por una región.
  hs_auto: Alternar sesión de reclamo automático. Cuando está activado, muévete en el desierto para reclamar chunks.
  hs_balance: Verificar el saldo bancario de una región.
  hs_banlist: Ver y gestionar baneos en una región.
  hs_ban: Banear a un jugador de entrar a una región.
  hs_borders: Ver los bordes de una región generando partículas dentro de los bordes del chunk.
  hs_chat: Hablar privadamente con los miembros de una región.
  claim: Reclamar un chunk.
  hs_claimlist: Ver y gestionar chunks reclamados de una región.
  hs_create: Crear una nueva región.
  hs_delete: Eliminar una región existente.
  hs_deny: Denegar una invitación que fue enviada por una región.
  hs_deposit: Transferir una cantidad de dinero de tu billetera a la cuenta bancaria de una región.
  hs_flags: Actualizar el estado de una flag.
  hs_fly: Alternar sesión de modo de vuelo. Cuando está activado, solo puedes volar dentro de los bordes de una región.
  hs_help: Ver lista de comandos.
  hs_home: Teletransportarte al spawn de una región seleccionada, más rápido que /hs visit.
  homestead: El comando principal para Homestead.
  hs_kick: Expulsar a un jugador de una región, solo si están dentro de los bordes de la región.
  hs_leave: Abandonar una región en la que eres de confianza.
  hs_levels: Ver el nivel y XP de una región.
  hs_logs: Ver y gestionar registros y correos de una región.
  hs_mail: Enviar un correo a una región, incluso cuando el dueño de la región está desconectado.
  hs_members: Ver y gestionar miembros de una región.
  hs_menu: Abrir el menú principal de Homestead.
  hs_mergeaccept: Aceptar una solicitud de fusión.
  hs_merge: Enviar una solicitud de fusión.
  hs_player: Ver la información de un jugador.
  hs_rate: Dar una calificación a una región.
  hs_info: Ver la información de una región.
  hs_rename: Actualizar el nombre de una región.
  hs_rewards: Ver las recompensas de una región.
  hs_setdescription: Actualizar la descripción de una región.
  hs_setdisplayname: Actualizar el nombre mostrado de una región.
  hs_setmapcolor: Actualizar el color del mapa de una región, para plugins de renderizado web.
  hs_setmapicon: Actualizar el icono del mapa de una región, para plugins de renderizado web.
  hs_setmembertax: Establecer la cantidad que cada jugador de confianza debe pagar para permanecer en la región.
  hs_set: Establecer una región como objetivo/seleccionada. Cualquier cambio a una región seleccionada se aplicará directamente a ella.
  hs_setspawn: Actualizar la ubicación de spawn de una región.
  hs_settime: Actualizar el tiempo de una región. Esta es una función del lado del cliente.
  hs_setweather: Actualizar el clima de una región. Esta es una función del lado del cliente.
  hs_storage: Ver el almacenamiento de una región, solo accesible por el dueño y jugadores de confianza.
  hs_subareas: Gestionar sub-áreas de una región.
  hs_top: Comparar tu región seleccionada con otras regiones.
  hs_trust: Invitar a un jugador a una región.
  hs_unban: Desbanear a un jugador de una región.
  unclaim: Desreclamar un chunk.
  hs_untrust: Desconfiar o revocar la invitación de un jugador para una región.
  hs_visit: Visitar una región.
  hs_war: Gestionar guerras.
  hs_withdraw: Transferir una cantidad de dinero del banco de una región a tu propia billetera.
