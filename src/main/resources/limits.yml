# Claim Limits System
# Control how many regions/chunks/members each player can have
limits:
  # Limit Assignment Method
  # 'static': Everyone gets same limits (except operators). Simple, no permissions plugin needed.
  # 'groups': Limits based on permission groups (LuckPerms, etc.). Requires permissions plugin.
  # 'permissions': Limits based on custom permission group name, no weight required (like LuckPerms). THIS IS EXPERIMENTAL
  method: 'static'

  # Group-Based Limits (only used if method = 'groups')
  # Configure per group: regions, chunks-per-region, members-per-region, subareas-per-region,
  # max-subarea-volume (blocks³), max-bank-deposit, max-force-loaded-chunks, commands-cooldown (seconds)
  groups:
    default:
      regions: 1
      chunks-per-region: 4
      members-per-region: 2
      subareas-per-region: 1
      max-subarea-volume: 400
      max-bank-deposit: 100000000
      max-force-loaded-chunks: 2
      commands-cooldown: 2

    vip:
      regions: 2
      chunks-per-region: 6
      members-per-region: 8
      subareas-per-region: 3
      max-subarea-volume: 800
      max-bank-deposit: 100000000
      max-force-loaded-chunks: 4
      commands-cooldown: 1

    mvp:
      regions: 3
      chunks-per-region: 12
      members-per-region: 16
      subareas-per-region: 6
      max-subarea-volume: 1600
      max-bank-deposit: 100000000
      max-force-loaded-chunks: 4
      commands-cooldown: 0

    admin:
      regions: 10
      chunks-per-region: 100
      members-per-region: 50
      subareas-per-region: 20
      max-subarea-volume: 5000
      max-bank-deposit: 100000000
      max-force-loaded-chunks: 100
      commands-cooldown: 0

  # Static Limits (only used if method = 'static')
  # Simple two-tier system: non-operators and operators
  static:
    non-op:
      regions: 1
      chunks-per-region: 4
      members-per-region: 2
      subareas-per-region: 1
      max-subarea-volume: 400
      max-bank-deposit: 100000000
      max-force-loaded-chunks: 2
      commands-cooldown: 2

    op:
      regions: 10
      chunks-per-region: 100
      members-per-region: 50
      subareas-per-region: 20
      max-subarea-volume: 5000
      max-bank-deposit: 100000000
      max-force-loaded-chunks: 100
      commands-cooldown: 0

  # Permissions Limits (only used if method = 'permissions')
  # Just like groups, but you will use permissions instead.
  permissions-priority:
    - admin
    - vip
    - mvp
    - default

  permissions:
    default:
      regions: 1
      chunks-per-region: 4
      members-per-region: 2
      subareas-per-region: 1
      max-subarea-volume: 400
      max-bank-deposit: 100000000
      max-force-loaded-chunks: 2
      commands-cooldown: 2

    vip:
      regions: 2
      chunks-per-region: 6
      members-per-region: 8
      subareas-per-region: 3
      max-subarea-volume: 800
      max-bank-deposit: 100000000
      max-force-loaded-chunks: 4
      commands-cooldown: 1

    mvp:
      regions: 3
      chunks-per-region: 12
      members-per-region: 16
      subareas-per-region: 6
      max-subarea-volume: 1600
      max-bank-deposit: 100000000
      max-force-loaded-chunks: 4
      commands-cooldown: 0

    admin:
      regions: 10
      chunks-per-region: 100
      members-per-region: 50
      subareas-per-region: 20
      max-subarea-volume: 5000
      max-bank-deposit: 100000000
      max-force-loaded-chunks: 100
      commands-cooldown: 0

# Per-Player Custom Limits
# Override limits for specific players by username (case-sensitive!)
# Use for: content creators, event rewards, builders, testing
# These override both group and static limits
player-limits:
  # Example: Custom limits for player 'TFA_Gaming' (me)
  # TFA_Gaming:
  #   regions: 5
  #   chunks-per-region: 25
  #   members-per-region: 15
  #   subareas-per-region: 10
  #   max-subarea-volume: 2000
  #   max-bank-deposit: 100000000
  #   max-force-loaded-chunks: 100
  #   commands-cooldown: 0
  A_PLAYER_NAME_GOES_HERE_FOR_SPECIAL_LIMITS:
    regions: 10
    chunks-per-region: 100
    members-per-region: 16
    subareas-per-region: 10
    max-subarea-volume: 1200
    max-bank-deposit: 100000000
    max-force-loaded-chunks: 100
    commands-cooldown: 0
