name: Homestead
main: tfagaming.projects.minecraft.homestead.Homestead
version: 5.2.0.0-26w18b
description: 'A chunk-based land claiming plugin'
author: TayebYassine
api-version: 1.21.10
folia-supported: true
depend: [Vault]
softdepend: [VaultUnlocked, Essentials, EssentialsX, CMI, TheNewEconomy, Polyconomy, iConomyUnlocked, BlueMap, squaremap, dynmap, Pl3xMap]
commands:
  claim:
    description: 'Claim a chunk using Homestead'
    usage: '/<command> <name>'
    permission: homestead.commands.claim
    default: true
  unclaim:
    description: 'Unclaim a chunk using Homestead'
    usage: '/<command>'
    permission: homestead.commands.unclaim
    default: true
  region:
    description: 'The main command to manage regions using Homestead'
    usage: '/<command> [subcommand] <args>'
    permission: homestead.commands.region
    aliases:
      - rg
      - hs
      - homestead
    default: true
  homesteadadmin:
    description: 'The main command for administrators to manage Homestead regions'
    usage: '/<command>'
    permission: homestead.commands.homesteadadmin
    aliases:
      - hsadmin
    default: op
  forceunclaim:
    description: 'Unclaim the Chunk you are stay on, do not care if it is yours or not.'
    usage: '/forceunclaim'
    aliases:
      - opunclaim
      - adminunclaim
    permission: homestead.admin.forceunclaim
    default: op
permissions:
  # Any kind of action
  homestead.actions.regions.create:
    default: true
  homestead.actions.regions.delete:
    default: true
  homestead.actions.regions.teleport:
    default: true
  homestead.actions.regions.fly:
    default: true
  homestead.actions.regions.kick:
    default: true
  homestead.actions.regions.players.ban:
    default: true
  homestead.actions.regions.players.unban:
    default: true
  homestead.actions.regions.players.trust:
    default: true
  homestead.actions.regions.players.untrust:
    default: true
  homestead.actions.regions.chat:
    default: true
  homestead.actions.regions.mail:
    default: true
  homestead.actions.regions.war:
    default: true
  homestead.actions.regions.storage:
    default: true
  homestead.actions.regions.deposit_bank:
    default: true
  homestead.actions.regions.withdraw_bank:
    default: true

  homestead.actions.regions.chunks.claim:
    default: true
  homestead.actions.regions.chunks.unclaim:
    default: true

  homestead.actions.regions.update.name:
    default: true
  homestead.actions.regions.update.displayname:
    default: true
  homestead.actions.regions.update.description:
    default: true
  homestead.actions.regions.update.spawn:
    default: true

  homestead.actions.regions.update.flags.global:
    default: true
  homestead.actions.regions.update.flags.world:
    default: true
  homestead.actions.regions.update.flags.members:
    default: true

