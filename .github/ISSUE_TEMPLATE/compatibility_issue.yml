name: Compatibility Issue
description: Homestead has issues with plugins or a software
labels: ["Compatibility"]
body:
  - type: input
    id: homestead-version
    attributes:
      label: Homestead Version
      placeholder: e.g. 5.0.2.0
    validations:
      required: true

  - type: input
    id: software-details
    attributes:
      label: Software causing compatibility issue
      description: The plugin or the software, with the version.
      placeholder: e.g. PlaceholderAPI 2.12.2, Java 21
    validations:
      required: true

  - type: textarea
    id: additional-info
    attributes:
      label: Additional Information
      description: Screenshots, configuration files, plugins, or anything else relevant.
      placeholder: Paste screenshots, config snippets, or plugin list here (optional).
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm all of the following before submitting.
      options:
        - label: I am using the latest version of the plugin.
          required: true
        - label: I am willing to cooperate to get this issue resolved as soon as possible.
          required: true
        - label: I understand that I must speak in the English language to make communication easier.
          required: true
        - label: I have checked that this issue was not reported before, or was reported but the resolution doesn't apply in my case.
          required: true
