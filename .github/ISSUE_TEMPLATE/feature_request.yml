name: Feature Request
description: Something you want to be implemented or added
labels: ["Feature"]
body:
  - type: textarea
    id: suggestion
    attributes:
      label: Suggestion
      description: Detailed suggestion for the feature you want to add or change.
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm all of the following before submitting.
      options:
        - label: I am willing to cooperate to provide more details if needed.
          required: true
        - label: I understand that I must speak in the English language to make communication easier.
          required: true
