name: Bug Report
description: Something isn't working as expected
labels: ["Bug"]
body:
  - type: input
    id: server-software
    attributes:
      label: Server Software & Version
      placeholder: e.g. Paper 1.21.10, Spigot 26.1, Folia 1.21.9
    validations:
      required: true

  - type: input
    id: homestead-version
    attributes:
      label: Homestead Version
      placeholder: e.g. 5.0.2.0
    validations:
      required: true

  - type: textarea
    id: bug-description
    attributes:
      label: Describe the Bug
      description: Include any error messages that were thrown.
      placeholder: A clear description of what the bug is...
    validations:
      required: true

  - type: input
    id: expected-behavior
    attributes:
      label: Expected Behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: Detailed steps to reproduce it
    validations:
      required: true

  - type: textarea
    id: additional-info
    attributes:
      label: Additional Information
      description: Screenshots, configuration files, plugins, or anything else relevant.
      placeholder: Paste screenshots, config snippets, or plugin list here (optional).
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm all of the following before submitting.
      options:
        - label: I am using the latest version of the plugin.
          required: true
        - label: I have checked the documentation to make sure it's not a configuration problem.
          required: true
        - label: I am willing to cooperate to get this issue resolved as soon as possible.
          required: true
        - label: I understand that I must speak in the English language to make communication easier.
          required: true
        - label: I have checked that this issue was not reported before, or was reported but the resolution doesn't apply in my case.
          required: true
